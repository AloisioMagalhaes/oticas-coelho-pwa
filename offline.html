<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Óticas Coelho</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      background: #F8F9FA;
      color: #212529;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1B6FF0; }
    p { color: #6C757D; margin-bottom: 2rem; max-width: 400px; }
    button {
      background: #1B6FF0;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1559C2; }
  </style>
</head>
<body>
  <div class="icon" aria-hidden="true">📡</div>
  <h1>Você está offline</h1>
  <p>Parece que você perdeu a conexão com a internet. Verifique sua rede e tente novamente.</p>
  <button onclick="window.location.reload()" type="button">Tentar novamente</button>
</body>
</html>
