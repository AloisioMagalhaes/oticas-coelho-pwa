<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B6FF0"/>
      <stop offset="100%" style="stop-color:#0F4496"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54D"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Glasses icon -->
  <g transform="translate(256, 256)">
    <!-- Left lens -->
    <ellipse cx="-70" cy="0" rx="55" ry="40" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <!-- Right lens -->
    <ellipse cx="70" cy="0" rx="55" ry="40" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <!-- Bridge -->
    <path d="M -15 0 Q 0 -15 15 0" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
    <!-- Left temple -->
    <line x1="-125" y1="-5" x2="-160" y2="-25" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
    <!-- Right temple -->
    <line x1="125" y1="-5" x2="160" y2="-25" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <!-- Brand initial -->
  <text x="256" y="380" text-anchor="middle" font-family="Poppins, sans-serif" font-size="72" font-weight="800" fill="white" opacity="0.9">Ó</text>
  
  <!-- Decorative stars -->
  <g fill="url(#gold)" opacity="0.6">
    <polygon points="80,80 85,95 100,95 88,105 92,120 80,110 68,120 72,105 60,95 75,95"/>
    <polygon points="430,100 434,110 445,110 436,118 439,128 430,122 421,128 424,118 415,110 426,110" transform="scale(0.8)"/>
  </g>
</svg>
